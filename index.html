<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
    <title>Calculator 2026</title>
  </head>
  <body>
    <main>
      <div id="calculator">
        <div class="result-display">
          <h1 class="result">0</h1>
        </div>
        <div class="keyboard">
          <button class="clear fifth-row">A/C</button>
          <button class="symbol fifth-row">m</button>
          <button class="symbol fifth-row">m</button>
          <button class="divide fifth-row operator">÷</button>

          <button class="number fourth-row">7</button>
          <button class="number fourth-row">8</button>
          <button class="number fourth-row">9</button>
          <button class="multiply fourth-row operator">x</button>

          <button class="number third-row">4</button>
          <button class="number third-row">5</button>
          <button class="number third-row">6</button>
          <button class="subtract third-row operator">-</button>

          <button class="number second-row">1</button>
          <button class="number second-row">2</button>
          <button class="number second-row">3</button>
          <button class="add second-row operator">+</button>

          <button class="number first-row">0</button>
          <button class="period first-row">.</button>
          <button class="symbol first-row">+/-</button>
          <button class="equal first-row">=</button>
        </div>
      </div>
    </main>
  </body>
</html>
